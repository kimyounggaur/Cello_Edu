<style>
:root{--bg:#1b1712;--bg2:#13100c;--ivory:#f4ecd8;--dim:#b7ac92;--brass:#c9a24b;--brassL:#e6cb7e;}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:radial-gradient(120% 80% at 50% -10%,#241e17 0%,var(--bg) 45%,var(--bg2) 100%);background-attachment:fixed;color:var(--ivory);font-family:"Noto Sans KR",system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
.topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:14px;padding:13px 22px;background:rgba(17,14,10,.86);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);border-bottom:1px solid rgba(201,162,75,.32)}
.brand{font-family:"Noto Serif KR",serif;font-weight:700;font-size:18px;letter-spacing:.5px}
.brand .en{font-weight:500;font-size:11.5px;color:var(--brass);letter-spacing:3px;margin-left:11px}
.spacer{flex:1}
.btn{font-family:"Noto Sans KR",sans-serif;font-size:13px;color:var(--brassL);background:transparent;border:1px solid rgba(201,162,75,.5);border-radius:999px;padding:8px 16px;cursor:pointer;transition:.18s;white-space:nowrap}
.btn:hover{background:rgba(201,162,75,.12);border-color:var(--brassL)}
main{max-width:1240px;margin:0 auto;padding:24px 22px 6px}
.intro{display:flex;flex-wrap:wrap;align-items:baseline;gap:8px 18px;margin:4px 4px 18px}
.intro .ey{font-family:"Noto Serif KR",serif;color:var(--brass);font-size:12.5px;letter-spacing:3px}
.intro .ds{color:var(--dim);font-size:14px}
.intro .tune{color:var(--dim);font-size:12.5px;margin-left:auto}
.intro .tune b{color:var(--ivory);font-weight:500}
.chartwrap{overflow-x:auto;border-radius:16px;box-shadow:0 18px 50px rgba(0,0,0,.55),0 0 0 1px rgba(201,162,75,.18);background:#100d0a;-webkit-overflow-scrolling:touch}
.chartwrap svg{display:block;min-width:720px;width:100%;height:auto}
.hint{color:var(--dim);font-size:12px;margin:9px 6px 0;text-align:right}
footer{max-width:1240px;margin:16px auto 46px;padding:16px 26px;color:var(--dim);font-size:12.5px;border-top:1px solid rgba(201,162,75,.2);display:flex;flex-wrap:wrap;gap:8px 18px;justify-content:space-between}
footer .serif{font-family:"Noto Serif KR",serif;color:var(--ivory)}
@media (max-width:560px){.brand{font-size:16px}.brand .en{display:none}main{padding:18px 12px}.intro .tune{margin-left:0}}
@media print{body{background:#fff}.topbar,.hint{display:none}.chartwrap{box-shadow:none;background:transparent;overflow:visible}.chartwrap svg{min-width:0}main{padding:0;max-width:none}footer{border:0}@page{margin:8mm}}
</style>

<text x="90.0" y="1952.0" font-family="Noto Sans KR" font-size="13" fill="#A99E84" font-weight="normal" text-anchor="start" letter-spacing="0.2">닫힌 자세에서는 이웃한 손가락 사이가 모두 반음입니다. 온음을 내려면 손가락을 건너뛰거나(예: 1·3) 손을 벌립니다(익스텐션).</text>
<text x="74.0" y="1979.0" font-family="Noto Sans KR" font-size="13" fill="#C9A24B" font-weight="normal" text-anchor="start">•</text>
<text x="90.0" y="1979.0" font-family="Noto Sans KR" font-size="13" fill="#A99E84" font-weight="normal" text-anchor="start" letter-spacing="0.2">익스텐션(벌림): 앞 벌림은 1번을 고정한 채 2·3·4를 반음 위로 옮겨 1–2가 온음이 되고, 손 폭이 단3도에서 장3도로 넓어집니다. 뒤 벌림은 1번만 반음 내립니다.</text>
<text x="74.0" y="2006.0" font-family="Noto Sans KR" font-size="13" fill="#C9A24B" font-weight="normal" text-anchor="start">•</text>
<text x="90.0" y="2006.0" font-family="Noto Sans KR" font-size="13" fill="#A99E84" font-weight="normal" text-anchor="start" letter-spacing="0.2">현은 완전5도로 조율됩니다. 같은 포지션·같은 손가락이라면 이웃한 현끼리는 정확히 완전5도 차이가 납니다 (예: C 자리는 한 현 위 F 자리와 마주봄).</text>

<text x="90.0" y="2033.0" font-family="Noto Sans KR" font-size="13" fill="#A99E84" font-weight="normal" text-anchor="start" letter-spacing="0.2">♯와 ♭는 같은 음높이의 다른 표기(이명동음)입니다. 위 지도에는 두 표기를 함께 적었습니다.</text>
