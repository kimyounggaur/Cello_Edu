<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>첼로 제1포지션 표준 운지표 | KIMYOUNGGAUR</title>
    <style>
        /* Notion 스타일의 미니멀하고 깔끔한 UI/UX 반영 */
        :root {
            --bg-color: #ffffff;
            --text-main: #37352f;
            --text-sub: #787774;
            --line-color: #e9e9e7;
            --accent-color: #0f172a;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background-color: #f7f6f3;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
            color: var(--text-main);
        }
        .a4-container {
            background-color: var(--bg-color);
            width: 210mm;
            min-height: 297mm;
            padding: 40px;
            box-sizing: border-box;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border-radius: 8px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--line-color);
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }
        .header p {
            font-size: 14px;
            color: var(--text-sub);
            margin: 0;
        }
        .chart-wrapper {
            display: flex;
            justify-content: center;
        }
        /* SVG 내의 텍스트 스타일 지정 */
        .svg-text { font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .note-text { font-weight: 600; font-size: 16px; fill: var(--text-main); }
        .string-label { font-weight: 700; font-size: 18px; fill: var(--accent-color); }
        .finger-label { font-weight: 500; font-size: 14px; fill: var(--text-sub); }
    </style>
</head>
<body>

    <div class="a4-container">
        <div class="header">
            <h1>첼로 표준 운지표 (제1포지션)</h1>
            <p>Cello 1st Position Standard Fingering Chart</p>
        </div>

        <div class="chart-wrapper">
            <svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
                
                <rect x="150" y="80" width="300" height="480" fill="#fcfcfc" stroke="#e9e9e7" stroke-width="1" rx="8"/>
                
                <rect x="150" y="80" width="300" height="12" fill="#37352f" rx="3"/>

                <line x1="190" y1="80" x2="190" y2="560" stroke="#787774" stroke-width="6" stroke-linecap="round"/>
                <line x1="260" y1="80" x2="260" y2="560" stroke="#9ca3af" stroke-width="4" stroke-linecap="round"/>
                <line x1="330" y1="80" x2="330" y2="560" stroke="#d1d5db" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="400" y1="80" x2="400" y2="560" stroke="#e5e7eb" stroke-width="1.5" stroke-linecap="round"/>

                <text x="190" y="45" text-anchor="middle" class="svg-text string-label">C현</text>
                <text x="190" y="65" text-anchor="middle" font-size="12" fill="#787774" class="svg-text">(IV)</text>
                
                <text x="260" y="45" text-anchor="middle" class="svg-text string-label">G현</text>
                <text x="260" y="65" text-anchor="middle" font-size="12" fill="#787774" class="svg-text">(III)</text>
                
                <text x="330" y="45" text-anchor="middle" class="svg-text string-label">D현</text>
                <text x="330" y="65" text-anchor="middle" font-size="12" fill="#787774" class="svg-text">(II)</text>
                
                <text x="400" y="45" text-anchor="middle" class="svg-text string-label">A현</text>
                <text x="400" y="65" text-anchor="middle" font-size="12" fill="#787774" class="svg-text">(I)</text>

                <text x="120" y="125" text-anchor="end" class="svg-text finger-label">개방현 (0)</text>
                <text x="120" y="225" text-anchor="end" class="svg-text finger-label">1번 (검지)</text>
                <text x="120" y="315" text-anchor="end" class="svg-text finger-label">2번 (중지)</text>
                <text x="120" y="405" text-anchor="end" class="svg-text finger-label">3번 (약지)</text>
                <text x="120" y="495" text-anchor="end" class="svg-text finger-label">4번 (소지)</text>

                <line x1="150" y1="220" x2="450" y2="220" stroke="#e9e9e7" stroke-width="2" stroke-dasharray="5,5"/>
                <line x1="150" y1="310" x2="450" y2="310" stroke="#e9e9e7" stroke-width="2" stroke-dasharray="5,5"/>
                <line x1="150" y1="400" x2="450" y2="400" stroke="#e9e9e7" stroke-width="2" stroke-dasharray="5,5"/>
                <line x1="150" y1="490" x2="450" y2="490" stroke="#e9e9e7" stroke-width="2" stroke-dasharray="5,5"/>

                <defs>
                    <circle id="open-note" cx="0" cy="0" r="16" fill="#ffffff" stroke="#37352f" stroke-width="2"/>
                    <circle id="fingered-note" cx="0" cy="0" r="18" fill="#ffffff" stroke="#0f172a" stroke-width="2.5"/>
                </defs>

                <use href="#open-note" x="190" y="120"/> <text x="190" y="125.5" text-anchor="middle" class="svg-text note-text">C</text>
                <use href="#open-note" x="260" y="120"/> <text x="260" y="125.5" text-anchor="middle" class="svg-text note-text">G</text>
                <use href="#open-note" x="330" y="120"/> <text x="330" y="125.5" text-anchor="middle" class="svg-text note-text">D</text>
                <use href="#open-note" x="400" y="120"/> <text x="400" y="125.5" text-anchor="middle" class="svg-text note-text">A</text>

                <use href="#fingered-note" x="190" y="220"/> <text x="190" y="225.5" text-anchor="middle" class="svg-text note-text">D</text>
                <use href="#fingered-note" x="260" y="220"/> <text x="260" y="225.5" text-anchor="middle" class="svg-text note-text">A</text>
                <use href="#fingered-note" x="330" y="220"/> <text x="330" y="225.5" text-anchor="middle" class="svg-text note-text">E</text>
                <use href="#fingered-note" x="400" y="220"/> <text x="400" y="225.5" text-anchor="middle" class="svg-text note-text">B</text>

                <use href="#fingered-note" x="190" y="310"/> <text x="190" y="315.5" text-anchor="middle" class="svg-text note-text">E♭</text>
                <use href="#fingered-note" x="260" y="310"/> <text x="260" y="315.5" text-anchor="middle" class="svg-text note-text">B♭</text>
                <use href="#fingered-note" x="330" y="310"/> <text x="330" y="315.5" text-anchor="middle" class="svg-text note-text">F</text>
                <use href="#fingered-note" x="400" y="310"/> <text x="400" y="315.5" text-anchor="middle" class="svg-text note-text">C</text>

                <use href="#fingered-note" x="190" y="400"/> <text x="190" y="405.5" text-anchor="middle" class="svg-text note-text">E</text>
                <use href="#fingered-note" x="260" y="400"/> <text x="260" y="405.5" text-anchor="middle" class="svg-text note-text">B</text>
                <use href="#fingered-note" x="330" y="400"/> <text x="330" y="405.5" text-anchor="middle" class="svg-text note-text">F♯</text>
                <use href="#fingered-note" x="400" y="400"/> <text x="400" y="405.5" text-anchor="middle" class="svg-text note-text">C♯</text>

                <use href="#fingered-note" x="190" y="490"/> <text x="190" y="495.5" text-anchor="middle" class="svg-text note-text">F</text>
                <use href="#fingered-note" x="260" y="490"/> <text x="260" y="495.5" text-anchor="middle" class="svg-text note-text">C</text>
                <use href="#fingered-note" x="330" y="490"/> <text x="330" y="495.5" text-anchor="middle" class="svg-text note-text">G</text>
                <use href="#fingered-note" x="400" y="490"/> <text x="400" y="495.5" text-anchor="middle" class="svg-text note-text">D</text>

            </svg>
            </div>
    </div>

</body>
</html>
